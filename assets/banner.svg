<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Animated gradient 1 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#0f0c29;#302b63;#24243e;#0f0c29" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%">
        <animate attributeName="stop-color" values="#302b63;#24243e;#0f0c29;#302b63" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#24243e;#0f0c29;#302b63;#24243e" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Animated accent gradient for title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2ff">
        <animate attributeName="stop-color" values="#00d2ff;#7b2ff7;#ff6a00;#00d2ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7b2ff7">
        <animate attributeName="stop-color" values="#7b2ff7;#ff6a00;#00d2ff;#7b2ff7" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>

    <!-- Scale gradient -->
    <linearGradient id="scaleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6a00"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#00d2ff"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="10s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Animated floating data nodes -->
  <g filter="url(#glow)">
    <!-- Node 1 -->
    <circle cx="150" cy="100" r="4" fill="#00d2ff">
      <animate attributeName="cy" values="100;80;120;100" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Node 2 -->
    <circle cx="350" cy="80" r="3" fill="#ffd700">
      <animate attributeName="cy" values="80;60;100;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Node 3 -->
    <circle cx="850" cy="120" r="5" fill="#ff6a00">
      <animate attributeName="cy" values="120;90;130;120" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Node 4 -->
    <circle cx="1050" cy="90" r="3" fill="#7b2ff7">
      <animate attributeName="cy" values="90;70;110;90" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Node 5 -->
    <circle cx="500" cy="50" r="2" fill="#00ff88">
      <animate attributeName="cy" values="50;30;70;50" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="5s" repeatCount="indefinite"/>
    </circle>
    <!-- Node 6 -->
    <circle cx="700" cy="60" r="2.5" fill="#ff69b4">
      <animate attributeName="cy" values="60;40;80;60" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connecting lines between nodes (data flow) -->
  <g opacity="0.2">
    <line x1="150" y1="100" x2="350" y2="80" stroke="#00d2ff" stroke-width="1">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="350" y1="80" x2="500" y2="50" stroke="#ffd700" stroke-width="1">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="700" y1="60" x2="850" y2="120" stroke="#ff69b4" stroke-width="1">
      <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="850" y1="120" x2="1050" y2="90" stroke="#ff6a00" stroke-width="1">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Moving particles along paths -->
  <circle r="2" fill="#00d2ff" opacity="0.8">
    <animateMotion duration="4s" repeatCount="indefinite" path="M150,100 Q250,300 350,80" />
  </circle>
  <circle r="1.5" fill="#ffd700" opacity="0.7">
    <animateMotion duration="5s" repeatCount="indefinite" path="M350,80 Q450,250 850,120" />
  </circle>
  <circle r="2" fill="#ff6a00" opacity="0.6">
    <animateMotion duration="6s" repeatCount="indefinite" path="M850,120 Q950,50 1050,90" />
  </circle>

  <!-- ===== BALANCE SCALE SYMBOL ===== -->

  <!-- Scale base (triangle/pedestal) -->
  <g transform="translate(600, 200)" filter="url(#glow)">
    <!-- Pedestal -->
    <rect x="-8" y="80" width="16" height="30" rx="3" fill="url(#scaleGrad)" opacity="0.7"/>
    <rect x="-30" y="105" width="60" height="8" rx="4" fill="url(#scaleGrad)" opacity="0.5"/>

    <!-- Center pivot -->
    <polygon points="0,80 -6,65 6,65" fill="url(#scaleGrad)" opacity="0.8">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </polygon>

    <!-- Beam -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0,0,65;-4,0,65;4,0,65;0,0,65" dur="4s" repeatCount="indefinite"/>
      <line x1="-140" y1="65" x2="140" y2="65" stroke="url(#scaleGrad)" stroke-width="3" stroke-linecap="round"/>

      <!-- Left pan strings -->
      <line x1="-120" y1="65" x2="-120" y2="100" stroke="url(#scaleGrad)" stroke-width="1.5" opacity="0.7"/>
      <line x1="-140" y1="65" x2="-140" y2="100" stroke="url(#scaleGrad)" stroke-width="1.5" opacity="0.7"/>
      <line x1="-130" y1="100" x2="-130" y2="65" stroke="url(#scaleGrad)" stroke-width="1" opacity="0.5"/>

      <!-- Left pan -->
      <path d="M-150,100 L-110,100 L-115,108 L-145,108 Z" fill="url(#scaleGrad)" opacity="0.6"/>

      <!-- Left indicator - a person icon (protected group) -->
      <circle cx="-130" cy="85" r="6" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.8"/>
      <line x1="-130" y1="91" x2="-130" y2="98" stroke="#00d2ff" stroke-width="1.5" opacity="0.8"/>

      <!-- Right pan strings -->
      <line x1="120" y1="65" x2="120" y2="100" stroke="url(#scaleGrad)" stroke-width="1.5" opacity="0.7"/>
      <line x1="140" y1="65" x2="140" y2="100" stroke="url(#scaleGrad)" stroke-width="1.5" opacity="0.7"/>
      <line x1="130" y1="100" x2="130" y2="65" stroke="url(#scaleGrad)" stroke-width="1" opacity="0.5"/>

      <!-- Right pan -->
      <path d="M110,100 L150,100 L145,108 L115,108 Z" fill="url(#scaleGrad)" opacity="0.6"/>

      <!-- Right indicator - a person icon (privileged group) -->
      <circle cx="130" cy="85" r="6" fill="none" stroke="#ff6a00" stroke-width="1.5" opacity="0.8"/>
      <line x1="130" y1="91" x2="130" y2="98" stroke="#ff6a00" stroke-width="1.5" opacity="0.8"/>
    </g>
  </g>

  <!-- ===== TITLE SECTION ===== -->

  <!-- Glow behind title -->
  <ellipse cx="600" cy="280" rx="350" ry="40" fill="url(#nodeGlow)" opacity="0.3">
    <animate attributeName="rx" values="350;380;350" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Main Title -->
  <text x="600" y="280" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="900" fill="url(#titleGrad)" filter="url(#glowStrong)" letter-spacing="2">
    ✦ Awesome-Bias-Mitigation ✦
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="600" y="315" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#a0a0c0" letter-spacing="3" opacity="0.8">
    Bias Mitigation in AI: History, Progression, Variants, &amp; Applications
  </text>

  <!-- Decorative line under title -->
  <line x1="300" y1="330" x2="900" y2="330" stroke="url(#titleGrad)" stroke-width="1.5" opacity="0.5">
    <animate attributeName="x1" values="400;300;400" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="800;900;800" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- Bottom accent bar -->
  <rect x="0" y="390" width="1200" height="10" fill="url(#titleGrad)" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner decorations -->
  <g opacity="0.3">
    <path d="M20,20 L80,20 L80,25 L25,25 L25,80 L20,80 Z" fill="#00d2ff">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M1180,20 L1120,20 L1120,25 L1175,25 L1175,80 L1180,80 Z" fill="#7b2ff7">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M20,380 L80,380 L80,375 L25,375 L25,320 L20,320 Z" fill="#ff6a00">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M1180,380 L1120,380 L1120,375 L1175,375 L1175,320 L1180,320 Z" fill="#00ff88">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Small "AI Fairness" badges at bottom -->
  <g opacity="0.4">
    <rect x="100" y="350" width="90" height="22" rx="11" fill="none" stroke="#00d2ff" stroke-width="1">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="145" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#00d2ff">⚖️ Fairness</text>

    <rect x="250" y="350" width="100" height="22" rx="11" fill="none" stroke="#ffd700" stroke-width="1">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="300" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffd700">📊 Parity</text>

    <rect x="850" y="350" width="110" height="22" rx="11" fill="none" stroke="#ff6a00" stroke-width="1">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="905" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff6a00">🔍 Equity</text>

    <rect x="1020" y="350" width="80" height="22" rx="11" fill="none" stroke="#7b2ff7" stroke-width="1">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="1060" y="365" text-anchor="middle" font-family="Arial" font-size="10" fill="#7b2ff7">🧠 ML</text>
  </g>
</svg>
